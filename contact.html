                        </ul>
                    </li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- Hero Section -->
    <section class="hero page-hero" style="background-image: url('images/hero/MORU0167.jpg'); background-size: cover; background-position: center; filter: grayscale(100%);">
        <div class="hero-overlay"></div>
        <div class="hero-content" style="z-index: 3; position: relative;">
            <h1 style="color: white; font-size: 4rem; letter-spacing: 2px; text-shadow: 0 4px 15px rgba(0,0,0,0.3);">Contact</h1>
        </div>
    </section>

    <!-- Contact Section -->
    <section class="contact-section">
        <h2>Chérie.</h2>

        <a href="#" class="ig-icon dark-icon form-ig">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
                <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
                <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
            </svg>
        </a>

        <div class="form-container">
            <form action="#" method="POST">
                <div class="form-group">
                    <label for="name">NAME *</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="email">EMAIL ADDRESS *</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="message">MESSAGE *</label>
                    <textarea id="message" name="message" rows="10" required></textarea>
                </div>

                <div class="captcha-mock">
                    <div class="captcha-checkbox">
                        <input type="checkbox" id="human" name="human" required>
                        <label for="human">Verify you are human</label>
                    </div>
                    <div class="captcha-brand">
                        <span>cloudflare</span><br>
                        <small>Privacy • Terms</small>
                    </div>
                </div>

                <button type="submit" class="submit-btn" style="width: 100%;">SEND MESSAGE</button>
            </form>
        </div>
    </section>

    <!-- Footer -->
    <footer class="main-footer">
        <div class="footer-content">
            <p>All content Copyright &copy; 2026 chérie</p>
            <div class="footer-right">
                <a href="#" class="ig-icon subtle-icon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
                        <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
                        <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
                    </svg>
                </a>
                <button class="back-to-top" aria-label="Back to top">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="19" x2="12" y2="5"></line>
                        <polyline points="5 12 12 5 19 12"></polyline>
                    </svg>
                </button>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>

</html>
